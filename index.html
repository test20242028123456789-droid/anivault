<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniVault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

::-webkit-scrollbar{
width:7px;
}

::-webkit-scrollbar-thumb{
background:#1e90ff;
border-radius:20px;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
height:72px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
background:rgba(0,0,0,.75);
backdrop-filter:blur(20px);
z-index:999;
border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
font-size:42px;
font-weight:800;
color:white;
}

.logo span{
color:#1e90ff;
}

.search-box{
width:380px;
max-width:45%;
position:relative;
}

.search-box input{
width:100%;
height:45px;
border:none;
outline:none;
background:#0f0f0f;
border:1px solid rgba(255,255,255,.08);
border-radius:40px;
padding:0 20px;
color:white;
font-size:14px;
}

.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
color:#ccc;
text-decoration:none;
font-size:14px;
transition:.3s;
}

.nav-links a:hover{
color:#1e90ff;
}

.hero{
margin-top:72px;
height:92vh;
position:relative;
display:flex;
align-items:center;
padding:0 80px;
overflow:hidden;
}

.hero-bg{
position:absolute;
inset:0;
background-size:cover;
background-position:center;
filter:brightness(.35);
transform:scale(1.1);
z-index:-2;
}

.hero-overlay{
position:absolute;
inset:0;
background:
linear-gradient(to right,#000 20%,rgba(0,0,0,.3)),
linear-gradient(to top,#050505 5%,transparent);
z-index:-1;
}

.hero-content{
max-width:650px;
}

.hero-tag{
color:#1e90ff;
margin-bottom:15px;
font-size:18px;
}

.hero h1{
font-size:72px;
line-height:1;
margin-bottom:20px;
}

.hero-meta{
display:flex;
gap:15px;
margin-bottom:20px;
color:#ccc;
}

.hero-desc{
line-height:1.8;
color:#bbb;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
gap:15px;
}

.hero-buttons button{
padding:15px 35px;
border:none;
border-radius:40px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.watch-btn{
background:#1e90ff;
color:white;
}

.info-btn{
background:#222;
color:white;
}

.watch-btn:hover,
.info-btn:hover{
transform:translateY(-3px);
}

.container{
padding:40px 50px;
}

.section-title{
font-size:32px;
margin-bottom:25px;
font-weight:700;
}

.main-layout{
display:grid;
grid-template-columns:1fr 320px;
gap:35px;
}

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:25px;
}

.card{
background:#0e0e0e;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.35s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
display:block;
}

.card-body{
padding:14px;
}

.card-title{
font-size:15px;
font-weight:600;
line-height:1.4;
height:44px;
overflow:hidden;
margin-bottom:8px;
}

.card-meta{
font-size:13px;
color:#999;
}

.sidebar{
background:#0b0b0b;
border-radius:18px;
padding:20px;
height:fit-content;
}

.top-item{
display:flex;
gap:12px;
margin-bottom:18px;
cursor:pointer;
}

.top-item img{
width:70px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.top-number{
font-size:28px;
font-weight:800;
color:#1e90ff;
width:40px;
}

.player-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.96);
z-index:99999;
display:none;
overflow:auto;
}

.player-container{
padding:25px;
}

.close-btn{
position:absolute;
top:20px;
right:25px;
width:50px;
height:50px;
border:none;
border-radius:50%;
background:#1e90ff;
color:white;
font-size:24px;
cursor:pointer;
}

.player{
width:100%;
height:75vh;
border:none;
border-radius:16px;
background:black;
}

.player-title{
font-size:35px;
margin-top:20px;
margin-bottom:20px;
font-weight:700;
}

.server-buttons{
display:flex;
gap:12px;
margin-bottom:20px;
}

.server-btn{
padding:10px 20px;
border:none;
background:#151515;
color:white;
border-radius:10px;
cursor:pointer;
}

.server-btn.active{
background:#1e90ff;
}

.episode-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
gap:10px;
}

.ep-btn{
padding:12px;
background:#111;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.ep-btn.active{
background:#1e90ff;
}

footer{
padding:40px;
text-align:center;
color:#777;
}

@media(max-width:1000px){

.main-layout{
grid-template-columns:1fr;
}

.hero{
padding:0 30px;
}

.hero h1{
font-size:52px;
}

}

@media(max-width:700px){

.nav-links{
display:none;
}

.search-box{
max-width:60%;
}

.hero{
height:80vh;
padding:0 20px;
}

.hero h1{
font-size:40px;
}

.container{
padding:30px 15px;
}

.anime-grid{
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
}

.card img{
height:210px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
En<span>ma!</span>
</div>

<div class="search-box">
<input type="text" placeholder="Search Anime..." id="searchInput">
</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">TV</a>
<a href="#">Popular</a>
<a href="#">Random</a>
</div>

</header>

<div class="hero">

<div class="hero-bg" id="heroBg"></div>

<div class="hero-overlay"></div>

<div class="hero-content">

<div class="hero-tag">
#1 Spotlight
</div>

<h1 id="heroTitle">
Loading...
</h1>

<div class="hero-meta">
<span id="heroEpisodes">24 Episodes</span>
<span>HD</span>
<span>SUB/DUB</span>
</div>

<div class="hero-desc" id="heroDesc">
Loading...
</div>

<div class="hero-buttons">

<button class="watch-btn" id="heroWatch">
▶ Watch Now
</button>

<button class="info-btn">
More Info
</button>

</div>

</div>

</div>

<div class="container">

<div class="main-layout">

<div>

<div class="section-title">
Trending Anime
</div>

<div class="anime-grid" id="animeGrid">
</div>

</div>

<div class="sidebar">

<div class="section-title">
Top 10
</div>

<div id="topSidebar"></div>

</div>

</div>

</div>

<footer>
AniVault © 2026
</footer>

<div class="player-modal" id="playerModal">

<button class="close-btn" onclick="closePlayer()">
✕
</button>

<div class="player-container">

<iframe
class="player"
id="animePlayer"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>

<div class="player-title" id="playerTitle">
Anime
</div>

<div class="server-buttons">

<button class="server-btn active"
onclick="changeLang('sub',this)">
SUB
</button>

<button class="server-btn"
onclick="changeLang('dub',this)">
DUB
</button>

</div>

<div class="episode-list" id="episodeList">
</div>

</div>

</div>

<script>

let animeData = [];
let currentAnime = null;
let currentLang = "sub";

async function loadTrending(){

const res = await fetch(
"https://api.jikan.moe/v4/top/anime?limit=20"
);

const data = await res.json();

animeData = data.data;

renderHero(animeData[0]);

renderAnime(animeData);

renderTop(animeData);

}

function renderHero(anime){

document.getElementById("heroBg").style.backgroundImage =
`url(${anime.images.jpg.large_image_url})`;

document.getElementById("heroTitle").innerText =
anime.title;

document.getElementById("heroEpisodes").innerText =
`${anime.episodes || "?"} Episodes`;

document.getElementById("heroDesc").innerText =
anime.synopsis
? anime.synopsis.substring(0,280) + "..."
: "No description.";

document.getElementById("heroWatch").onclick =
()=> playAnime(anime);

}

function renderAnime(list){

const grid =
document.getElementById("animeGrid");

grid.innerHTML = "";

list.forEach(anime=>{

const card =
document.createElement("div");

card.className = "card";

card.innerHTML = `

<img src="${anime.images.jpg.large_image_url}">

<div class="card-body">

<div class="card-title">
${anime.title}
</div>

<div class="card-meta">
⭐ ${anime.score || "N/A"} • EP ${anime.episodes || "?"}
</div>

</div>

`;

card.onclick = ()=> playAnime(anime);

grid.appendChild(card);

});

}

function renderTop(list){

const container =
document.getElementById("topSidebar");

container.innerHTML = "";

list.slice(0,10).forEach((anime,index)=>{

const item =
document.createElement("div");

item.className = "top-item";

item.innerHTML = `

<div class="top-number">
${String(index+1).padStart(2,'0')}
</div>

<img src="${anime.images.jpg.image_url}">

<div>

<div style="font-weight:600;">
${anime.title}
</div>

<div style="color:#777;font-size:13px;margin-top:6px;">
⭐ ${anime.score || "N/A"}
</div>

</div>

`;

item.onclick = ()=> playAnime(anime);

container.appendChild(item);

});

}

function playAnime(anime){

currentAnime = anime;

document.getElementById("playerModal").style.display =
"block";

document.getElementById("playerTitle").innerText =
anime.title;

renderEpisodes(anime.episodes || 12);

loadEpisode(1);

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function loadEpisode(ep){

const url =
`https://megaplay.buzz/stream/mal/${currentAnime.mal_id}/${ep}/${currentLang}`;

document.getElementById("animePlayer").src =
url;

}

function renderEpisodes(count){

const list =
document.getElementById("episodeList");

list.innerHTML = "";

for(let i=1;i<=count;i++){

const btn =
document.createElement("button");

btn.className = "ep-btn";

if(i===1){
btn.classList.add("active");
}

btn.innerText = i;

btn.onclick = ()=>{

document.querySelectorAll(".ep-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadEpisode(i);

};

list.appendChild(btn);

}

}

function changeLang(lang,btn){

currentLang = lang;

document.querySelectorAll(".server-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

const active =
document.querySelector(".ep-btn.active");

const ep =
active ? active.innerText : 1;

loadEpisode(ep);

}

function closePlayer(){

document.getElementById("playerModal").style.display =
"none";

document.getElementById("animePlayer").src =
"";

}

document.getElementById("searchInput")
.addEventListener("input", async(e)=>{

const q = e.target.value.trim();

if(q.length <= 1){

renderAnime(animeData);

return;

}

const res = await fetch(
`https://api.jikan.moe/v4/anime?q=${q}&limit=24`
);

const data = await res.json();

renderAnime(data.data);

});

loadTrending();

</script>

</body>
</html>
