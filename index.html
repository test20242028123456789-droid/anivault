<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniVault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
color:white;
}

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(15px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
z-index:999;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:32px;
font-weight:700;
color:#2b8fff;
}

.search-box{
width:350px;
height:45px;
background:#0f0f0f;
border-radius:30px;
display:flex;
align-items:center;
padding:0 20px;
border:1px solid rgba(255,255,255,0.08);
}

.search-box input{
background:none;
border:none;
outline:none;
color:white;
width:100%;
font-size:15px;
}

.hero{
height:100vh;
background:
linear-gradient(to right,#000 25%,rgba(0,0,0,0.4)),
url('https://images6.alphacoders.com/135/1358471.jpeg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:100px;
}

.hero-content{
max-width:650px;
}

.hero h1{
font-size:72px;
line-height:1;
margin-bottom:20px;
}

.hero p{
font-size:18px;
color:#ccc;
line-height:1.7;
margin-bottom:30px;
}

.watch-btn{
padding:15px 35px;
border:none;
background:#2b8fff;
color:white;
font-size:18px;
border-radius:40px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.watch-btn:hover{
transform:scale(1.05);
}

.section{
padding:50px 60px;
}

.section-title{
font-size:32px;
margin-bottom:30px;
font-weight:600;
}

.anime-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:25px;
}

.card{
background:#111;
border-radius:18px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-title{
font-size:17px;
font-weight:600;
margin-bottom:8px;
}

.card-info{
font-size:14px;
color:#aaa;
}

.player-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.player-container{
width:90%;
height:90%;
background:#000;
border-radius:20px;
overflow:hidden;
position:relative;
}

.player-container iframe{
width:100%;
height:100%;
border:none;
}

.close-btn{
position:absolute;
top:20px;
right:20px;
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
font-size:16px;
border-radius:10px;
z-index:10;
}

</style>
</head>
<body>

<div class="navbar">

<div class="logo">
AniVault
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search Anime...">
</div>

</div>

<div class="hero">

<div class="hero-content">

<h1>Watch Anime Online</h1>

<p>
Stream your favorite anime series and movies with a modern UI inspired by HiAnime and Enma.
</p>

<button class="watch-btn">
Start Watching
</button>

</div>

</div>

<div class="section">

<div class="section-title">
Trending Anime
</div>

<div class="anime-grid" id="animeGrid">

</div>

</div>

<div class="player-modal" id="playerModal">

<div class="player-container">

<button class="close-btn" onclick="closePlayer()">
Close
</button>

<iframe
id="animePlayer"
allowfullscreen
allow="autoplay; fullscreen">
</iframe>

</div>

</div>

<script>

const animeData = [

{
title:"One Piece",
image:"https://cdn.myanimelist.net/images/anime/6/73245.jpg",
anilist:21,
episode:1
},

{
title:"Attack on Titan",
image:"https://cdn.myanimelist.net/images/anime/10/47347.jpg",
anilist:16498,
episode:1
},

{
title:"Naruto",
image:"https://cdn.myanimelist.net/images/anime/13/17405.jpg",
anilist:20,
episode:1
},

{
title:"Bleach",
image:"https://cdn.myanimelist.net/images/anime/3/40451.jpg",
anilist:269,
episode:1
},

{
title:"Demon Slayer",
image:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg",
anilist:101922,
episode:1
},

{
title:"Jujutsu Kaisen",
image:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg",
anilist:113415,
episode:1
}

];

const grid = document.getElementById('animeGrid');

function renderAnime(list){

grid.innerHTML='';

list.forEach(anime=>{

const card=document.createElement('div');

card.className='card';

card.innerHTML=`

<img src="${anime.image}">

<div class="card-body">

<div class="card-title">
${anime.title}
</div>

<div class="card-info">
Episode ${anime.episode}
</div>

</div>

`;

card.onclick=()=>playAnime(anime);

grid.appendChild(card);

});

}

renderAnime(animeData);

function playAnime(anime){

document.getElementById('playerModal').style.display='flex';

document.getElementById('animePlayer').src=
`https://megaplay.buzz/stream/ani/${anime.anilist}/${anime.episode}/sub`;

}

function closePlayer(){

document.getElementById('playerModal').style.display='none';

document.getElementById('animePlayer').src='';

}

document.getElementById('searchInput')
.addEventListener('input',e=>{

const q=e.target.value.toLowerCase();

const filtered=animeData.filter(a=>
a.title.toLowerCase().includes(q)
);

renderAnime(filtered);

});

</script>

</body>
</html>
